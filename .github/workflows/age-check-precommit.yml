# ============================================================================
# REUSABLE: pre-commit Hook Rev Age Check (supply-chain guard, PUBLIC mirror)
# ----------------------------------------------------------------------------
# Self-contained: the bash lib is inlined below. No cross-repo checkout,
# no secrets required, no GitHub App involved. Public consumer repos
# point at this file (at the equivalent `layervai/ops-routines-workflows`
# mirror) because GitHub blocks public → internal reusable-workflow calls.
#
# Quarantines any newly added / bumped `.pre-commit-config.yaml` `rev:`
# pinned to a github.com tag younger than `min_age_days`, on EVERY PR —
# the all-PRs parity the bot-path autoupdate gate (qurl-service#889) could
# not provide. See lib/age-check-precommit.sh for the age basis and the
# explicit non-github-host (fail-closed) handling (qurl-service#890).
#
# DO NOT EDIT THIS FILE DIRECTLY. It's generated by
# `scripts/embed-lib-into-workflows.py` from:
#   - lib/_preflight.sh
#   - lib/age-check-precommit.sh
#   - templates/workflows/age-check-precommit.yml.tmpl
# Edit those sources and run `make embed-workflows`.
# ============================================================================
name: Dependency Age Check (pre-commit, reusable)

on:
  workflow_call:
    inputs:
      min_age_days:
        description: "Minimum tag age in days for any newly-pinned pre-commit hook rev"
        type: number
        required: false
        default: 7
      comment_on_failure:
        description: |
          Post a sticky PR comment listing pins that failed the age check
          and how many days each has left until eligible. Requires the
          calling job to grant `pull-requests: write` (Dependabot PRs need
          this granted explicitly; the default Dependabot token is
          read-only). Soft-fails to a `::notice` if the token can't write.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: age-check-precommit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  age-check:
    name: Check pre-commit hook rev ages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # Only used when `comment_on_failure: true`. Caller's job-level
      # `permissions:` block caps this; if the caller restricts to
      # `contents: read` (or runs as Dependabot without an explicit
      # grant), the post-step soft-fails to a `::notice`.
      pull-requests: write
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run age-check-precommit.sh
        env:
          MIN_AGE_DAYS: ${{ inputs.min_age_days }}
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
          # No AGE_CHECK_SKIP_SELF_REFS: unlike the actions check, pre-commit
          # hooks never reference the age-check infra, so there is no
          # self-block to dodge (see lib/age-check-precommit.sh header).
          #
          # `record_failure` writes a TSV row here for each too-new pin
          # so the post-step below can render the data into a comment
          # without redoing classification. Unset → no-op.
          AGE_CHECK_FAILURES_FILE: ${{ runner.temp }}/age-check-failures.tsv
          # The consumer's default token suffices: pre-commit hooks are
          # public github.com repos (releases/tags/commits readable by any
          # token), and non-github hosts fail closed without an API call.
          GH_TOKEN: ${{ github.token }}
        run: |
          # ============================================================================
          # _preflight.sh - Shared preflight helpers for age-check-*.sh
          # ============================================================================
          #
          # Sourced by each ecosystem-specific age-check script so the validator
          # logic stays consistent. Covers the class of silent-pass bugs that
          # bit the sibling per-repo dep-age checks (website#189, qurl-mcp#52,
          # qurl-portal#14, qurl-typescript#32, discord#21) before they were
          # hardened, plus the preflight probes those rounds added:
          #
          # - Positive-integer validation for MIN_AGE_DAYS (reject 0 and
          #   non-numeric)
          # - GNU `date -d` availability probe (catches BSD/macOS silently
          #   replacing GNU date)
          # - Required-tool existence checks (jq, curl, gh)
          # - Explicit base_ref verification before `git diff` so a missing ref
          #   doesn't get conflated with "no changes detected" by a trailing
          #   `|| true` on the filter pipeline
          # - Step-summary helpers so the Actions UI never shows an empty panel
          #   on early-exit paths
          # - Shared age comparison + ISO-8601 parsing to keep those callers
          #   minimal
          #
          # REQUIRED CALL ORDER in main():
          #
          #   preflight::require_tools jq curl [gh …]   # tools first
          #   preflight::require_gnu_date                # then date-d probe
          #   preflight::validate_min_age_days           # then env validation
          #   preflight::verify_base_ref "origin/${BASE_REF}"  # MUST come before any
          #                                              # subsequent `git diff` — see
          #                                              # the function comment for
          #                                              # the silent-pass reason.
          #
          # Usage (from an age-check script):
          #
          #   # shellcheck source=lib/_preflight.sh
          #   source "$(dirname "${BASH_SOURCE[0]}")/_preflight.sh"
          #
          # ============================================================================

          # Guard against double-sourcing — IFS and `set -e` state are caller's.
          if [ -n "${_PREFLIGHT_SOURCED:-}" ]; then
            return 0
          fi
          _PREFLIGHT_SOURCED=1

          # ----- Required-tool probes --------------------------------------------------

          preflight::require_tools() {
            local missing=()
            local tool
            for tool in "$@"; do
              command -v "$tool" >/dev/null 2>&1 || missing+=("$tool")
            done
            if [ ${#missing[@]} -gt 0 ]; then
              echo "::error::Required tools not available on runner: ${missing[*]}. This workflow depends on ubuntu-latest (or a runner image with these installed)."
              exit 1
            fi
          }

          # GNU date supports `date -d @<epoch>` syntax that BSD/macOS date
          # rejects. Every age-check script converts an ISO-8601 timestamp to
          # epoch via `date -d "$ts" +%s`; probing up front catches a silent
          # regression if the runner ever stops providing GNU date.
          preflight::require_gnu_date() {
            if ! date -d @0 >/dev/null 2>&1; then
              echo "::error::GNU date -d not available on runner — this workflow depends on GNU date's \`@\`-prefix epoch syntax. Fix: run on an \`ubuntu-latest\` / Linux runner, or replace the \`date -d\` calls with a portable alternative (e.g., \`python -c 'from datetime import datetime; ...'\`)."
              exit 1
            fi
          }

          # ----- MIN_AGE_DAYS validation ----------------------------------------------

          # Accept only POSITIVE integers (numeric value >= 1). Leading zeros are
          # allowed because some config generators pad to fixed width (e.g. "07");
          # a `07 ... 10#` base-10 round-trip keeps later arithmetic from tripping
          # on bash's octal parsing of zero-prefixed numbers at `$age_days -lt
          # $MIN_AGE_DAYS`.
          #
          # Rejects: 0, 00, negatives, non-numeric, empty.
          # Accepts: 1, 07, 100, 0007.
          preflight::validate_min_age_days() {
            local raw="${MIN_AGE_DAYS:-}"
            # Require at least one digit, reject non-digits. The `10#` base-10
            # prefix on the arithmetic below sidesteps bash's octal interpretation
            # of leading zeros (`$((07))` is 7 but `$((08))` is a syntax error).
            if ! [[ "$raw" =~ ^[0-9]+$ ]]; then
              echo "::error::MIN_AGE_DAYS must be a positive integer (got: ${raw:-<unset>})"
              exit 1
            fi
            if [ "$((10#$raw))" -lt 1 ]; then
              echo "::error::MIN_AGE_DAYS must be >= 1 (got: ${raw}). Zero would make the quarantine a silent-pass no-op."
              exit 1
            fi
            # Normalize to the base-10 numeric form so all subsequent callers do
            # integer comparisons without re-parsing leading zeros. Exported
            # because the variable was passed via env and most scripts reference
            # it directly rather than through a local.
            MIN_AGE_DAYS=$((10#$raw))
            export MIN_AGE_DAYS
          }

          # ----- Base-ref verification -------------------------------------------------

          # Verify the base ref exists in the local checkout before running
          # `git diff` against it. Without this, `git diff ... 2>/dev/null` on
          # a missing ref produces empty output, and a trailing `|| true` on
          # the downstream filter pipeline silently swallows the failure — the
          # script exits 0 with "No changes detected" even though the diff
          # never ran. Friendly error here, explicit failure exit.
          #
          # MUST BE CALLED before any subsequent `git diff`. Callers that extract
          # a diff via `$(git diff ...)` inside a helper function are protected
          # by this preflight *only* for the expected "missing base ref" failure
          # mode; for catastrophic git failures mid-script the helper still needs
          # its own `|| { echo ::error; return 1; }` branch.
          preflight::verify_base_ref() {
            local base_ref="$1"
            if [ -z "$base_ref" ]; then
              echo "::error::preflight::verify_base_ref called with empty argument"
              exit 1
            fi
            if ! git rev-parse --verify --quiet "$base_ref" >/dev/null; then
              echo "::error::Base ref ${base_ref} not found in this checkout. If you triggered this workflow via workflow_dispatch, ensure the base branch is fetched (fetch-depth: 0 on actions/checkout)."
              exit 1
            fi
            # Record successful verification so `preflight::require_base_ref_verified`
            # can assert it elsewhere if callers want a belt-and-suspenders check.
            _PREFLIGHT_BASE_REF_VERIFIED=1
          }

          # Optional defensive check: assert verify_base_ref has run. Callers can
          # invoke this right before a `git diff` as a static sanity check that
          # the required-call-order convention was actually followed.
          preflight::require_base_ref_verified() {
            if [ -z "${_PREFLIGHT_BASE_REF_VERIFIED:-}" ]; then
              echo "::error::preflight::verify_base_ref must be called before any git diff. This is a coding error, not a runtime condition."
              exit 1
            fi
          }

          # ----- ISO-8601 → epoch helper ----------------------------------------------

          # Every ecosystem converts a registry-returned ISO-8601 timestamp into
          # epoch seconds via `date -d "$ts" +%s`, and every one had its own
          # error-handling branch. Shared helper echoes epoch on stdout, exits 1
          # on parse failure with the offending timestamp in the stderr message.
          # Caller can use `if ! epoch=$(preflight::iso8601_to_epoch "$ts"); then
          # ...skip or fail... fi`.
          preflight::iso8601_to_epoch() {
            local ts="$1"
            local epoch
            if [ -z "$ts" ]; then
              return 1
            fi
            if ! epoch=$(date -d "$ts" +%s 2>/dev/null); then
              return 1
            fi
            echo "$epoch"
          }

          # Given a publish epoch + now epoch + MIN_AGE_DAYS, emit the age in
          # days on stdout and return a classification via exit code:
          #   0 - passes; age >= MIN_AGE_DAYS + 2 (clearly past threshold)
          #   2 - passes but borderline; MIN_AGE_DAYS <= age <= MIN_AGE_DAYS + 1
          #       (the "just past threshold" :eyes: case — advance warning that
          #       a small threshold bump or an unpublish would flip this PR)
          #   1 - fails; age < MIN_AGE_DAYS (too new)
          #
          # !!! CALLER CONVENTION !!!
          # Callers MUST use a 3-way `case` on the exit code, NOT a 2-way
          # `if/then/else`. A naïve `if preflight::classify_age …; then ok; else fail; fi`
          # would silently misclassify BOTH `1` (too_new) AND `2` (borderline)
          # as failures — losing the advance-warning signal and (worse) treating
          # a borderline pass as a block.
          #
          # Correct pattern:
          #   rc=0
          #   age_days=$(preflight::classify_age "$pub" "$now" "$MIN_AGE_DAYS") || rc=$?
          #   case "$rc" in
          #     0) ok ;;
          #     2) borderline ;;
          #     *) too_new ;;  # catches 1 and any future non-pass codes
          #   esac
          #
          preflight::classify_age() {
            local publish_epoch="$1" now_epoch="$2" min_age_days="$3"
            local age_days=$(( (now_epoch - publish_epoch) / 86400 ))
            echo "$age_days"
            if [ "$age_days" -lt "$min_age_days" ]; then
              return 1
            fi
            if [ "$age_days" -le "$((min_age_days + 1))" ]; then
              return 2
            fi
            return 0
          }

          # Given a publish epoch + MIN_AGE_DAYS, echo the ISO date (UTC) when
          # the package becomes eligible. Used in the "too new" error message
          # so developers know when to retry without needing the bypass label.
          # Falls back to "unknown" on parse error rather than breaking the
          # error message flow.
          preflight::eligible_date_utc() {
            local publish_epoch="$1" min_age_days="$2"
            date -u -d "@$((publish_epoch + min_age_days * 86400))" +%Y-%m-%d 2>/dev/null || echo "unknown"
          }

          # Append a single failure row to a workflow-level TSV so a downstream
          # job step can render the data into a PR comment without re-doing the
          # classification work. No-op when AGE_CHECK_FAILURES_FILE is unset (the
          # common case — local dev, callers that didn't opt into the comment
          # feature). Format is one row per failed pin:
          #
          #   <display_id>\t<display_version>\t<age_days>\t<min_age_days>\t<eligible_date>\t<days_remaining>\t<kind>
          #
          # `kind` is `too_new` (this helper) or `unverifiable` (sibling helper
          # `preflight::record_unverifiable`). The downstream renderer splits on
          # kind so each failure class gets the right operator guidance:
          # too-new → "wait until the eligible date"; unverifiable → "re-run".
          #
          # Tabs were chosen over JSON because the consumer (a small bash step in
          # the template) parses with `IFS=$'\t' read` — no jq dependency, and
          # `display_id` / `display_version` have already been run through
          # `safe_for_md` so they cannot contain tabs.
          #
          # `days_remaining` is computed as calendar-day delta between today (UTC,
          # midnight) and the eligible-after date. That matches the `eligible_date`
          # column the user reads on the same row — the alternative (`min - age`)
          # off-by-ones on freshly-committed pins because `age_days` floors:
          # a pin committed 22h ago has age_days=0, so `min - age` would suggest
          # "wait 7 days" when in calendar terms only 6 days remain until eligible.
          # Falls back to the floor approximation only if the eligible string is
          # unparseable (defensive — should never happen since the caller fed it
          # through `eligible_date_utc`). Clamped at 0 to defend against clock
          # skew producing a negative.
          preflight::record_failure() {
            local file="${AGE_CHECK_FAILURES_FILE:-}"
            [ -z "$file" ] && return 0
            local display_id="$1" display_version="$2" age_days="$3"
            local min_age_days="$4" eligible="$5"
            local days_remaining today_epoch eligible_epoch
            today_epoch=$(date -u -d "$(date -u +%Y-%m-%d)" +%s 2>/dev/null || true)
            eligible_epoch=$(date -u -d "${eligible}" +%s 2>/dev/null || true)
            if [ -n "${today_epoch}" ] && [ -n "${eligible_epoch}" ]; then
              days_remaining=$(( (eligible_epoch - today_epoch) / 86400 ))
            else
              days_remaining=$(( min_age_days - age_days ))
            fi
            [ "$days_remaining" -lt 0 ] && days_remaining=0
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$display_id" "$display_version" "$age_days" \
              "$min_age_days" "$eligible" "$days_remaining" \
              "too_new" \
              >> "$file"
          }

          # Sibling of `record_failure` for the "couldn't fetch metadata" failure
          # class — a pin shape-checks fine, but the registry / API / proxy returned
          # an error or empty body so the script can't compute an age. Without
          # this, transient upstream failures produce a red required check with
          # no PR-level explanation: the comment-on-failure step gates on `[ -s
          # FAILURES_FILE ]`, and the only writer was `record_failure` (too-new
          # only). The reviewer then has to dig into the run log to discover that
          # the failure was a 5xx and a re-run will pass.
          #
          # Writes the same TSV schema as `record_failure` so the renderer reads
          # one format. The age / eligible / remaining columns carry sentinels
          # (`?` / "n/a" / `?`) — the renderer hides those columns for the
          # unverifiable section since "wait N days" copy doesn't apply. The
          # `reason` arg is what gets shown to the operator in lieu of the
          # eligible-after date.
          #
          # Args:
          #   $1 display_id        already sanitized via safe_for_md
          #   $2 display_version   already sanitized via safe_for_md
          #   $3 reason            short human-readable cause, e.g.
          #                        "gh api unreachable or commit not found"
          #                        — surfaces in the comment so the reviewer
          #                        knows whether to re-run or open an upstream
          #                        issue. Tabs are stripped to keep the row
          #                        parseable.
          preflight::record_unverifiable() {
            local file="${AGE_CHECK_FAILURES_FILE:-}"
            [ -z "$file" ] && return 0
            local display_id="$1" display_version="$2"
            local reason="${3:-unknown reason}"
            # Strip characters that would corrupt the downstream comment:
            #   - tabs/newlines break `IFS=$'\t' read` (multiline reason would
            #     produce row count != failure count)
            #   - `|` breaks the markdown table layout — the reason cell sits
            #     between two `|` separators in the rendered comment, and an
            #     embedded `|` would split the row into extra columns. All
            #     in-tree call sites pass pipe-free strings today; this strip
            #     defends a future caller forwarding upstream error text (e.g.,
            #     curl stderr that happens to contain `|`).
            reason=$(printf '%s' "$reason" | tr -d '\t\n|')
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$display_id" "$display_version" "?" \
              "n/a" "$reason" "?" \
              "unverifiable" \
              >> "$file"
          }

          # ----- Shared age-check outcome helper --------------------------------------

          # Classify a dependency's age and emit the full CI output for it
          # (markdown row + log annotation). Returns an exit code the caller
          # can map to its counters. For the typical caller pattern that
          # updates both `checked_count` and `failed`, use the thin wrapper
          # `preflight::age_row_and_tally` which does the mapping via bash's
          # dynamic scoping.
          #
          # !!! SECURITY CONTRACT !!!
          # `display_id` and `display_version` are interpolated directly into:
          #   - the markdown row (caller-inspectable via $GITHUB_STEP_SUMMARY)
          #   - log lines (visible in the Actions job log)
          # This helper does NOT re-sanitize them. Callers MUST pre-sanitize via
          # `preflight::safe_for_md` (or a tighter ecosystem-specific validator
          # like `is_valid_pkg_name`) before passing in, otherwise a crafted
          # lockfile / registry response could inject active markdown into the
          # step summary.
          #
          # Arguments:
          #   $1 display_id        e.g. "lodash" or "actions/checkout" (sanitized)
          #   $2 display_version   e.g. "4.17.21" or "1a2b3c4d" (sanitized)
          #   $3 publish_time      ISO-8601 string from the registry
          #   $4 now_epoch         caller's pre-computed `date +%s`
          #   $5 min_age_days      positive integer (caller already validated)
          #   $6 verb              past-tense verb for too-new error messages
          #                        ("published" | "committed" | "built" |
          #                        "uploaded"). Defaults to "published".
          #   $7 file_hint         optional source filename for `file=` annotation
          #   $8 separator         how to join id + version in log lines. Default
          #                        "@"; pip uses "==".
          #
          # Exit codes (richer than ok/fail so callers can distinguish borderline
          # from too_new, and parse_error from a real too-new result):
          #   0 — ok (clearly past threshold)
          #   1 — too_new
          #   2 — borderline (just past threshold; counts as pass, with :eyes: row)
          #   3 — parse_error (malformed ISO-8601 or missing required arg)
          preflight::age_row_for_publish() {
            local display_id="$1" display_version="$2" publish_time="$3"
            local now_epoch="$4" min_age_days="$5"
            local verb="${6:-published}"
            local file_hint="${7:-}"
            local sep="${8:-@}"

            # Required-arg validation. Name the specific missing arg in the
            # error so a future caller doesn't have to bisect. `verb`, `file_hint`,
            # `sep` have defaults; the five below do not. Empty values would
            # surface later as arithmetic errors or spurious row text.
            local arg
            for arg in display_id display_version publish_time now_epoch min_age_days; do
              if [ -z "${!arg}" ]; then
                echo "::error::preflight::age_row_for_publish: required arg \`${arg}\` was empty"
                return 3
              fi
            done

            # Full identifier for log lines; row cells stay separate.
            local full_id="${display_id}${sep}${display_version}"

            # GitHub Actions annotation format requires `::` between command
            # (+ optional params) and message. `::error::msg` is valid;
            # `::error msg` is NOT and will render as plain log text. So:
            #   no file_hint → `::` (bare delimiter)
            #   with hint    → ` file=<path>::` (leading space separates
            #                  `::error` from params, trailing `::` closes them)
            local file_prefix="::"
            [ -n "$file_hint" ] && file_prefix=" file=${file_hint}::"

            local publish_epoch
            if ! publish_epoch=$(preflight::iso8601_to_epoch "$publish_time"); then
              echo "::error${file_prefix}Could not parse publish timestamp for ${full_id}: ${publish_time}"
              echo "| \`${display_id}\` | ${display_version} | — | :x: parse error |" >> "$GITHUB_STEP_SUMMARY"
              return 3
            fi

            local age_days class_rc=0
            age_days=$(preflight::classify_age "$publish_epoch" "$now_epoch" "$min_age_days") || class_rc=$?

            case "$class_rc" in
              0)
                echo "  OK: ${full_id} (${age_days} days old)"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :white_check_mark: |" >> "$GITHUB_STEP_SUMMARY"
                return 0
                ;;
              2)
                echo "::notice${file_prefix}${full_id} is ${age_days} day(s) old — just past the ${min_age_days}-day threshold"
                echo "  OK: ${full_id} (${age_days} days old, barely past threshold)"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :eyes: just past threshold |" >> "$GITHUB_STEP_SUMMARY"
                return 2
                ;;
              *)
                local eligible; eligible=$(preflight::eligible_date_utc "$publish_epoch" "$min_age_days")
                echo "::error${file_prefix}${full_id} ${verb} ${age_days} day(s) ago (minimum: ${min_age_days}; eligible after ${eligible})"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :x: **too new** (eligible after ${eligible}) |" >> "$GITHUB_STEP_SUMMARY"
                preflight::record_failure "$display_id" "$display_version" "$age_days" "$min_age_days" "$eligible"
                return 1
                ;;
            esac
          }

          # Wraps `preflight::age_row_for_publish` and updates the caller's
          # `checked_count` and `failed` via bash's dynamic scoping. This is the
          # call most ecosystem scripts should use — one line, no case statement
          # at the callsite.
          #
          # Convention: caller MUST have locals named exactly `checked_count`
          # (integer) and `failed` ("true"/"false"). These are looked up through
          # the dynamic scope chain at runtime — no nameref magic, works on
          # bash >= 4.0 (and on macOS bash 3.2 for local-dev tests).
          #
          # Outcome mapping:
          #   ok (rc 0)            → checked_count++
          #   borderline (rc 2)    → checked_count++
          #   too_new (rc 1)       → checked_count++, failed=true
          #   parse_error (rc 3)   → failed=true (checked not incremented)
          #
          # All args are passed through to age_row_for_publish unchanged.
          preflight::age_row_and_tally() {
            local rc=0
            preflight::age_row_for_publish "$@" || rc=$?
            # Deliberate dynamic-scope writes: caller provides `checked_count`
            # and `failed` as locals; we update them in place.
            # shellcheck disable=SC2034
            case "$rc" in
              0|2) checked_count=$((checked_count + 1)) ;;
              1)   checked_count=$((checked_count + 1)); failed=true ;;
              3)   failed=true ;;
            esac
          }

          # ----- Output sanitization --------------------------------------------------

          # Sanitize arbitrary strings before writing to $GITHUB_STEP_SUMMARY.
          # Used for values that either pre-date a validator (the invalid-name
          # branch in each ecosystem) or come from untrusted lockfile / registry
          # output (version strings, image tags). Strips to a character class
          # that can't form active markdown (link/image/emphasis/HTML) and caps
          # length at 80 so a crafted over-long entry can't blow out the summary.
          #
          # Kept permissive enough that legitimate semver (`1.2.3+build.7`) and
          # scoped package names (`@scope/name`) survive round-trip unchanged.
          #
          # `LC_ALL=C` forces byte-level (ASCII-only) behavior so the tr + head
          # combo is deterministic across hosts. In a UTF-8 locale, `[:alnum:]`
          # would keep accented Latin letters and CJK chars, and `head -c 80`
          # could split a multibyte char at the boundary. Neither is a security
          # hole (markdown injection is still blocked), but byte-level behavior
          # is easier to audit and test. Unicode homoglyph attacks on package
          # names are a separate concern — handled (if at all) by the caller's
          # `is_valid_*` ASCII-only allowlists, not here.
          preflight::safe_for_md() {
            LC_ALL=C printf '%s' "$1" | LC_ALL=C tr -cd '[:alnum:]@/_.:+-' | LC_ALL=C head -c 80
          }

          # ----- Step-summary helpers --------------------------------------------------

          # `GITHUB_STEP_SUMMARY` is provided by GitHub Actions; default to
          # /dev/null for local runs so the helper doesn't error out. The
          # workflow always provides it in CI.
          : "${GITHUB_STEP_SUMMARY:=/dev/null}"

          preflight::step_summary_header() {
            local ecosystem="$1"
            {
              echo "## Dependency Age Check — ${ecosystem}"
              echo ""
              echo "| Package | Version | Age (days) | Status |"
              echo "|---------|---------|------------|--------|"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # For the "no changes" / "no deps" early-exit paths. Writes a single
          # summary blockquote line so the Actions UI reflects the early-exit
          # outcome instead of an empty summary panel.
          preflight::step_summary_no_changes() {
            local ecosystem="$1" reason="$2"
            {
              echo "## Dependency Age Check — ${ecosystem}"
              echo ""
              echo "> ${reason} :white_check_mark:"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          preflight::step_summary_all_passed() {
            local checked_count="$1" min_age_days="$2" skipped_count="${3:-0}"
            {
              echo ""
              echo "> Verified ${checked_count} package(s) at ≥ ${min_age_days} days old. :white_check_mark:"
              if [ "$skipped_count" -gt 0 ]; then
                echo "> ${skipped_count} skipped (see warnings above)."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # Now accepts optional counts so the footer breakdown matches what
          # callers actually tracked. Positional args are kept backwards-compatible
          # (only min_age_days is required).
          preflight::step_summary_failed() {
            local min_age_days="$1" checked_count="${2:-}" skipped_count="${3:-}"
            {
              echo ""
              echo "> **One or more dependencies failed the ${min_age_days}-day age check.** Add the \`age-check-bypass\` label to override (verified-CVE bypass only — see runbooks/phase-0-checklist.md)."
              if [ -n "$checked_count" ] || [ -n "$skipped_count" ]; then
                echo ">"
                echo "> Breakdown: **${checked_count:-?}** checked, **${skipped_count:-0}** skipped. See the table above for which rows failed (marked :x:)."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # Guard against "registry outage → every package skipped → workflow
          # passes" — if nothing actually got verified, fail and write a
          # summary explaining why.
          preflight::step_summary_all_skipped() {
            local skipped_count="$1"
            {
              echo ""
              echo "> **No packages could be verified** (all ${skipped_count} were skipped). Treating as failure to avoid silent pass on registry outage."
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # ============================================================================
          # age-check-precommit.sh - Block newly-pinned pre-commit hook revs (supply chain)
          # ============================================================================
          #
          # Purpose:
          #   pre-commit analog of the go/actions/docker checks. Diffs
          #   `.pre-commit-config.yaml` against origin/$BASE_REF, and for every remote
          #   hook whose `rev:` is newly added or changed, confirms the pinned TAG is
          #   >= MIN_AGE_DAYS old. Fails closed if a rev is too young or its age can't
          #   be verified.
          #
          #   This closes the gap the bot-path gate could not: the weekly
          #   `pre-commit autoupdate` quarantine (qurl-service's
          #   .github/scripts/precommit_age_gate.py, #889) only governs revs the BOT
          #   adopts. This check runs on EVERY PR, so a human hand-editing
          #   `.pre-commit-config.yaml` to a fresh rev is quarantined too — matching how
          #   the go/actions/docker age-checks already gate human-authored pins
          #   (qurl-service#890).
          #
          # Age basis (TAG pins, mirrors precommit_age_gate.py::publish_dt):
          #   A pre-commit `rev:` pins a TAG, and a tag is a movable pointer — it can be
          #   re-pointed onto an old commit while the release itself is brand new. So the
          #   faithful "age of what we're adopting" is the tag's *publish* moment:
          #     1. GitHub Release `published_at` for the tag (the freshness signal).
          #     2. Annotated tag → tagger date.
          #     3. Lightweight tag → commit committer date.
          #   Tiers 1-2 reflect the publish moment; tier 3 can UNDERSTATE freshness — a
          #   lightweight tag re-pointed onto an old commit but pushed today reports the
          #   old commit's age. GitHub exposes no creation time for a lightweight tag
          #   ref, so there is no better signal; any hook that ships a Release or an
          #   annotated tag (the two qurl-service pins today) is covered by tiers 1-2.
          #   Day math is the shared `preflight::classify_age` floor, identical to every
          #   other ecosystem.
          #
          # GITHUB.COM-ONLY (non-github hosts handled explicitly — qurl-service#890):
          #   Age probing uses the GitHub REST API, so only github.com hooks are
          #   verifiable. A non-github host (GitLab/Codeberg/self-hosted) is treated as
          #   UNVERIFIABLE and FAILS CLOSED — the quarantine's natural parallel to the
          #   bot gate's "defer forever, never adopt". Because the check is diff-scoped
          #   (only newly added/changed revs), this blocks ONLY the PR that introduces or
          #   bumps a non-github hook, not every later PR; the `age-check-bypass` label is
          #   the escape hatch for a vetted hook. Acceptable today (this repo pins only
          #   github.com hooks); a real host (with its own age API) can be supported
          #   later without changing callers.
          #
          # Self-reference skip: intentionally OMITTED. The actions check skips pins at
          #   layervai/ops-routines{,-workflows} to dodge a chicken-and-egg on its own
          #   releases. pre-commit hooks never reference the age-check infra, so there is
          #   no parallel — adding a skip-list here would be cargo-culting.
          #
          # Expected env vars:
          #   MIN_AGE_DAYS - default 7 (hook revs are source tags, like go/actions)
          #   BASE_REF     - default 'main'
          #   GH_TOKEN     - required for the `gh api` release/tag/commit lookups
          #
          # Exit codes:
          #   0 - all newly-added hook revs are SHA/tag-resolvable and >= MIN_AGE_DAYS old
          #   1 - a rev is too young, unverifiable, or hosted off github.com
          #
          # ============================================================================

          set -euo pipefail
          IFS=$'\n\t'

          MIN_AGE_DAYS="${MIN_AGE_DAYS:-7}"
          BASE_REF="${BASE_REF:-main}"


          # ----- Input validation: github slug + tag ----------------------------------

          # These values flow into `gh api` URL paths. They are passed as subprocess
          # list-args (never a shell string), and additionally constrained here so a
          # hostile owner/repo/tag from a compromised hook repo cannot redirect the API
          # path (e.g. a `../` traversal in a tag name). Anything failing the pattern is
          # treated as unverifiable -> fail-closed, never adopted. Mirrors
          # precommit_age_gate.py's SAFE_SLUG / SAFE_TAG.
          precommit_age::is_valid_tag() {
            [[ "$1" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ ]]
          }

          # Echo the `owner/repo` slug for a github.com hook URL, else return 1.
          # Only `https://github.com/...` (and http / www.) URLs resolve; the scp-style
          # `git@github.com:owner/repo` form, and every non-github host, return 1 and
          # fail closed at the call site. Mirrors precommit_age_gate.py::slug_of,
          # including the explicit `.`/`..` path-segment rejection that SAFE_SLUG alone
          # would let through.
          precommit_age::github_slug() {
            local url="$1" rest host path owner repo
            rest="${url#*://}"
            # No scheme stripped => not an http(s) URL (e.g. scp-style git@host:owner/repo).
            [ "$rest" = "$url" ] && return 1
            host="${rest%%/*}"
            path="${rest#*/}"
            host="$(printf '%s' "$host" | tr '[:upper:]' '[:lower:]')"
            case "$host" in
              github.com|www.github.com) ;;
              *) return 1 ;;
            esac
            path="${path%/}"        # trailing slash
            path="${path%.git}"     # trailing .git
            # Require exactly one slash: reject host-only (`github.com/owner`, no repo —
            # `${path#*/}` would otherwise echo the owner back as a bogus repo) and 3+
            # segments (`owner/repo/extra`) so the slug stays a single owner/repo that
            # can't walk the API path.
            case "$path" in
              */*/*) return 1 ;;   # 3+ segments
              */*) ;;              # exactly owner/repo — ok
              *) return 1 ;;       # no slash => host-only, no repo
            esac
            owner="${path%%/*}"
            repo="${path#*/}"
            [ -n "$owner" ] && [ -n "$repo" ] || return 1
            # Reject `.`/`..` segments explicitly: SAFE_SLUG below allows `.` as an
            # ordinary char, so `owner/..` would otherwise pass and walk the API path.
            case "$owner" in .|..) return 1 ;; esac
            case "$repo" in .|..) return 1 ;; esac
            [[ "$owner/$repo" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]] || return 1
            printf '%s' "$owner/$repo"
          }

          # Strip a single layer of matching surrounding quotes from a YAML scalar.
          # `revs()`-style values are read raw from the file, so a quoted pin
          # (`rev: "v1.2.3"`) round-trips to the unquoted value for validation + the
          # gh api call. A bare value passes through unchanged.
          precommit_age::unquote() {
            local s="$1" f l
            if [ "${#s}" -ge 2 ]; then
              f="${s:0:1}"
              l="${s:$((${#s} - 1)):1}"
              if { [ "$f" = '"' ] || [ "$f" = "'" ]; } && [ "$f" = "$l" ]; then
                printf '%s' "${s:1:$((${#s} - 2))}"
                return 0
              fi
            fi
            printf '%s' "$s"
          }

          # ----- Separable: find changed pre-commit configs ---------------------------

          # Split `git diff` from the awk filter so a diff failure (missing base ref,
          # etc.) doesn't silently pass as "no changes detected." Caller is expected to
          # have already invoked `preflight::verify_base_ref`. Matches the canonical
          # `.pre-commit-config.yaml` (and `.yml`) at any directory depth — monorepos can
          # carry nested configs used with `pre-commit -c`.
          precommit_age::changed_configs() {
            local base_ref="$1" diff_out
            diff_out=$(git diff --name-only "${base_ref}...HEAD") \
              || { echo "::error::git diff --name-only against ${base_ref} failed"; return 1; }
            printf '%s\n' "$diff_out" \
              | awk '/(^|\/)\.pre-commit-config\.ya?ml$/' \
              | sort -u || true
          }

          # ----- Separable: parse remote (repo URL -> rev) pairs ----------------------

          # Read a pre-commit config document on stdin, emit one `url<TAB>rev` line per
          # remote hook that carries a `rev:`. A disciplined line walk (NOT a full YAML
          # parse): track the most recent `repo:` value, and on a `rev:` line emit it for
          # that repo. This mirrors the bot gate's documented assumption that every hook
          # block lists `repo:` before its `rev:` — which `pre-commit autoupdate` always
          # emits, and humans conventionally write. Comments and surrounding quotes are
          # left on the raw value here; the caller normalizes (`unquote`) before use, and
          # `repo: local` / `meta` blocks carry no `rev:` so they never emit. Exotic
          # shapes (flow style, anchors) are not handled — a rev the walk can't associate
          # is simply not checked, which is safe because the diff-vs-base comparison in
          # `changed_pins` only ever ADDS work; it never suppresses a sibling ecosystem.
          precommit_age::pairs_from_text() {
            awk '
              {
                line = $0
                # Strip a trailing inline comment ( # ...). Requires whitespace before
                # the # so a # inside a value is not eaten (hook URLs/tags carry none).
                sub(/[[:space:]]+#.*$/, "", line)
              }
              match(line, /^[[:space:]]*-?[[:space:]]*repo:[[:space:]]*/) {
                val = substr(line, RSTART + RLENGTH)
                sub(/[[:space:]]+$/, "", val)
                cur = val
                next
              }
              match(line, /^[[:space:]]*rev:[[:space:]]*/) {
                val = substr(line, RSTART + RLENGTH)
                sub(/[[:space:]]+$/, "", val)
                if (cur != "" && val != "") print cur "\t" val
                next
              }
            '
          }

          # Emit `url<TAB>rev` for every remote hook pin that is newly added or changed
          # in <file> relative to <base_ref>. Computed as the set difference of the
          # after-state pairs minus the before-state pairs (full-line, tab-joined), so a
          # brand-new hook (whole file added => empty before) and a bumped rev are both
          # caught, while an untouched pin is not. Set-difference avoids any associative
          # array (works on the bash 3.2 used by local-dev tests) and intentionally
          # OVER-checks rather than under-checks: a rev re-pinned to a previously-used
          # (older) tag is re-verified and simply passes.
          precommit_age::changed_pins() {
            local file="$1" base_ref="$2" before after
            before=$(git show "${base_ref}:${file}" 2>/dev/null | precommit_age::pairs_from_text || true)
            if [ -f "$file" ]; then
              after=$(precommit_age::pairs_from_text < "$file")
            else
              after=""   # file deleted in this PR => no pins to check
            fi
            [ -z "$after" ] && return 0
            if [ -z "$before" ]; then
              printf '%s\n' "$after"
            else
              # after-lines not present verbatim in before. -x full-line, -F fixed-string
              # so the literal tab and any regex metachars in a URL/rev are matched as-is.
              printf '%s\n' "$after" | grep -vxF -f <(printf '%s\n' "$before") || true
            fi
          }

          # ----- Separable: tag publish timestamp via GitHub REST ---------------------

          # Single field from `gh api <path> --jq <jq>`, or empty on any error.
          # Fail-closed: non-zero exit, empty body, or literal `null` all map to "" so
          # the caller treats the pin as unverifiable rather than adopting it unchecked.
          precommit_age::gh_api() {
            local path="$1" jq="$2" out
            out=$(gh api "$path" --jq "$jq" 2>/dev/null) || out=""
            [ "$out" = "null" ] && out=""
            printf '%s' "$out"
          }

          # Best-effort ISO-8601 timestamp the tag became public; return 1 if
          # unverifiable. Three tiers (see header for the age-basis rationale).
          precommit_age::publish_dt() {
            local slug="$1" tag="$2" ts ref obj_type sha
            # 1. GitHub Release publish date — the tag-pin freshness signal.
            ts=$(precommit_age::gh_api "repos/${slug}/releases/tags/${tag}" '.published_at // empty')
            # 2. Annotated tag -> tagger date. One ref lookup returns both the object
            #    type and sha (tab-joined) so this costs a single extra round-trip.
            if [ -z "$ts" ]; then
              # SINGULAR `git/ref/tags/<tag>` (exact match), NOT plural `git/refs/...`.
              # The plural endpoint is a PREFIX match: for a moving major-version pin
              # (`v1`, `v4`) that prefixes other tags it returns a JSON *array*, jq
              # `.object.type` then errors -> gh_api yields "" -> this tier is skipped
              # and the rev silently falls through to the freshness-understating commit
              # tier. The singular endpoint returns the single object for an exact tag
              # and 404s cleanly (-> "") for a non-exact one. Endpoint matches
              # lib/verify-cve.sh (singular ref form); the two-field tab-split below is
              # local to this function. The "\t" jq emits is a LITERAL tab; the
              # parameter expansions below split on the same tab. Keep the two in sync.
              ref=$(precommit_age::gh_api "repos/${slug}/git/ref/tags/${tag}" '.object.type + "\t" + .object.sha')
              obj_type="${ref%%$'\t'*}"
              sha="${ref#*$'\t'}"
              # {7,64} not {7,40}: allow SHA-256 object IDs (64 hex) for repos that
              # migrate off SHA-1, so an annotated tag doesn't fall through to the
              # freshness-understating lightweight-tag tier.
              if [ "$obj_type" = "tag" ] && [[ "$sha" =~ ^[0-9a-f]{7,64}$ ]]; then
                ts=$(precommit_age::gh_api "repos/${slug}/git/tags/${sha}" '.tagger.date // empty')
              fi
            fi
            # 3. Lightweight tag -> commit committer date. The one tier that can
            #    UNDERSTATE freshness (see header); no better signal exists.
            if [ -z "$ts" ]; then
              ts=$(precommit_age::gh_api "repos/${slug}/commits/${tag}" '.commit.committer.date // empty')
            fi
            [ -n "$ts" ] || return 1
            printf '%s' "$ts"
          }

          # ----- Main -----------------------------------------------------------------

          precommit_age::main() {
            preflight::require_tools gh awk sed grep sort
            preflight::require_gnu_date
            preflight::validate_min_age_days

            local base_ref="origin/${BASE_REF}"
            preflight::verify_base_ref "$base_ref"

            local now_epoch; now_epoch=$(date +%s)
            local failed=false
            local checked_count=0

            local files; files=$(precommit_age::changed_configs "$base_ref")
            if [ -z "$files" ]; then
              echo "No .pre-commit-config.yaml changes detected"
              preflight::step_summary_no_changes "pre-commit" "No \`.pre-commit-config.yaml\` changes detected in this diff."
              exit 0
            fi

            preflight::step_summary_header "pre-commit"

            for file in $files; do
              echo "::group::Checking ${file}"
              local pins; pins=$(precommit_age::changed_pins "$file" "$base_ref")
              if [ -z "$pins" ]; then
                echo "No new or changed remote hook revs in ${file}"
                echo "::endgroup::"
                continue
              fi

              while IFS=$'\t' read -r url rev; do
                [ -z "$url" ] && continue
                url=$(precommit_age::unquote "$url")
                rev=$(precommit_age::unquote "$rev")
                [ -z "$rev" ] && continue
                # `repo: local` / `meta` blocks carry no rev so normally never reach
                # here; skip defensively in case a malformed block emitted one.
                case "$url" in local|meta) continue ;; esac

                local slug
                if ! slug=$(precommit_age::github_slug "$url"); then
                  # Non-github host (or unparseable URL): unverifiable by the GitHub-API
                  # prober -> fail closed. Diff-scoped, so only the introducing PR is
                  # blocked; bypass label is the escape hatch (see header).
                  local safe_url safe_rev_u
                  safe_url=$(preflight::safe_for_md "$url")
                  safe_rev_u=$(preflight::safe_for_md "$rev")
                  echo "::error file=${file}::Cannot age-verify hook ${url}@${rev}: only github.com hooks are supported by the age prober (non-github host)."
                  echo "| \`${safe_url}\` | \`${safe_rev_u}\` | — | :x: non-github host (unverifiable) |" >> "$GITHUB_STEP_SUMMARY"
                  preflight::record_unverifiable "$safe_url" "$safe_rev_u" \
                    "non-github host; only github.com hooks are age-verifiable"
                  failed=true
                  continue
                fi

                # Sanitized labels for step-summary cells + the shared age helper.
                local safe_slug safe_rev
                safe_slug=$(preflight::safe_for_md "$slug")
                safe_rev=$(preflight::safe_for_md "$rev")

                if ! precommit_age::is_valid_tag "$rev"; then
                  echo "::error file=${file}::Hook ${slug}@${rev} — rev failed shape validation (rejected before gh api)."
                  echo "| \`${safe_slug}\` | \`${safe_rev}\` | — | :x: invalid rev shape |" >> "$GITHUB_STEP_SUMMARY"
                  preflight::record_unverifiable "$safe_slug" "$safe_rev" "rev failed shape validation"
                  failed=true
                  continue
                fi

                local ts
                if ! ts=$(precommit_age::publish_dt "$slug" "$rev"); then
                  echo "::error file=${file}::Could not verify age for ${slug}@${rev} (no release/tag/commit date via gh api)."
                  echo "| \`${safe_slug}\` | \`${safe_rev}\` | — | :x: api unreachable |" >> "$GITHUB_STEP_SUMMARY"
                  preflight::record_unverifiable "$safe_slug" "$safe_rev" \
                    "gh api unreachable or tag not found"
                  failed=true
                  continue
                fi

                # Classify + emit via shared helper. _and_tally updates checked_count
                # and failed via dynamic scoping. Verb is "published" (a tag is
                # published); row cells carry the owner/repo slug + rev.
                preflight::age_row_and_tally \
                  "$safe_slug" "$safe_rev" "$ts" "$now_epoch" "$MIN_AGE_DAYS" \
                  "published" "$file" "@"
              done <<< "$pins"

              echo "::endgroup::"
            done

            if [ "$failed" = true ]; then
              preflight::step_summary_failed "$MIN_AGE_DAYS" "$checked_count" "0"
              echo ""
              echo "::error::One or more pre-commit hooks failed the age check."
              echo "To bypass for emergency security updates, add the 'age-check-bypass' label to this PR."
              exit 1
            fi

            preflight::step_summary_all_passed "$checked_count" "$MIN_AGE_DAYS"
            echo "All pre-commit hook revs are at least ${MIN_AGE_DAYS} days old"
          }
          precommit_age::main

      - name: Comment retry-after dates on PR
        if: ${{ !cancelled() && inputs.comment_on_failure && github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MIN_AGE_DAYS: ${{ inputs.min_age_days }}
          FAILURES_FILE: ${{ runner.temp }}/age-check-failures.tsv
          # Per-ecosystem render parameters. Bash body below is identical
          # across all reusables; only these env values change.
          ECOSYSTEM: precommit
          ITEM_COLUMN: Hook
          SEPARATOR: "@"
        run: |
          # ============================================================================
          # comment-on-failure.sh - Post sticky PR comment with retry-after dates
          # ============================================================================
          #
          # Embedded into each `age-check-<eco>.yml.tmpl` at the
          # `# @@COMMENT_ON_FAILURE@@` marker by `scripts/embed-lib-into-workflows.py`.
          #
          # Reads the TSV that `preflight::record_failure` and
          # `preflight::record_unverifiable` wrote during the main run step (one row
          # per failed pin) and renders a single sticky comment. Each row carries a
          # `kind` column — `too_new` or `unverifiable` — so the renderer can split
          # into two sections with the right operator action: too-new pins get an
          # eligible-after date and "wait then push any commit"; unverifiable pins
          # (registry/API outages, missing manifests, etc.) get the upstream reason
          # and "re-run the failed check." Updates an existing sticky in place
          # (marker is `<!-- ops-routines:age-check-comment:${ECOSYSTEM} -->`);
          # deletes the sticky on a clean run so a stale "X days remaining" doesn't
          # outlive the failure that produced it.
          #
          # Soft-fails on permission denial (typical on Dependabot PRs where the
          # token is read-only) — emits a `::notice` so the run still succeeds and
          # the user can find retry-after dates in the Job Summary.
          #
          # Required env (set per-ecosystem in the calling step):
          #   GH_TOKEN, REPO, PR_NUMBER, RUN_URL, MIN_AGE_DAYS, FAILURES_FILE,
          #   ECOSYSTEM, ITEM_COLUMN, SEPARATOR
          # ============================================================================

          set -euo pipefail

          MARKER="<!-- ops-routines:age-check-comment:${ECOSYSTEM} -->"

          # `gh api ... --paginate` pages through all PR comments. The jq filter
          # selects whichever one carries our marker (there should be 0 or 1).
          # `--jq '... // empty'` returns the empty string when no match — keeps
          # `existing_id` testable with `[ -n "$existing_id" ]`.
          existing_id=$(
            gh api --paginate "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | first | .id // empty" \
              2>/dev/null || true
          )

          if [ -s "${FAILURES_FILE:-/dev/null}" ]; then
            body_file=$(mktemp)
            # Dedupe rows: a single pin referenced in N workflow / lockfile
            # entries records N identical TSV rows (one per file processed by
            # the main script). Per-file `::error file=…` annotations correctly
            # fire N times so each file in the Files Changed tab gets its own
            # inline annotation; this comment is a SUMMARY, not a per-file
            # annotation, so it should list each pin once. `sort -u` works
            # because age / eligible / remaining / kind are identical for a
            # given (id, version) within a single run (the script captures
            # `now_epoch` once at startup).
            deduped_failures=$(mktemp)
            sort -u "${FAILURES_FILE}" > "${deduped_failures}"

            # Split rows by kind, deduping cross-kind for the same pin. The
            # legacy assumption was "a pin is either too_new OR unverifiable in a
            # single run" — true within a single file, but a pin referenced in
            # two changed files can hit both branches if `gh api` succeeds for
            # file A and fails for file B (transient mid-run flake). When that
            # happens the too_new judgment is the durable answer (we have a valid
            # age from the file where the fetch succeeded); the unverifiable from
            # the other file is just noise. Without this dedup, a reviewer sees
            # the same pin in both sections with conflicting actions
            # ("wait until eligible" AND "re-run the failed check"), which is
            # confusing and slightly misleading.
            #
            # Two-pass awk via the `NR==FNR` trick: pass 1 collects the set of
            # (id, version) pairs that have a too_new row; pass 2 emits each row
            # to its kind's output file, skipping an unverifiable row when its
            # (id, version) is already in the too_new set. Empty `kind` column on
            # a legacy row defaults to too_new — defensive only; both writers
            # always set it.
            #
            # Wrapped in `if !` so a future regression in the awk script (output
            # path collision, syntax error, etc.) doesn't trip `set -e` and
            # silently suppress the comment — the whole point of this feature is
            # to surface failures at PR review time without forcing the reviewer
            # to dig into logs. Fallback dumps the deduped data into the too_new
            # bucket so the reviewer at least sees the failed pins, with a
            # `::warning` flagging the degraded render.
            too_new_failures=$(mktemp)
            unverifiable_failures=$(mktemp)
            if ! awk -F '\t' '
              NR == FNR {
                if (($7 == "" ? "too_new" : $7) == "too_new") {
                  too_new_pins[$1 "\t" $2] = 1
                }
                next
              }
              {
                kind = $7 == "" ? "too_new" : $7
                if (kind == "too_new") {
                  print > too_new_out
                } else if (kind == "unverifiable") {
                  key = $1 "\t" $2
                  if (!(key in too_new_pins)) {
                    print > unverifiable_out
                  }
                }
              }
            ' too_new_out="${too_new_failures}" \
              unverifiable_out="${unverifiable_failures}" \
              "${deduped_failures}" "${deduped_failures}"; then
              echo "::warning::age-check renderer failed to split rows by kind; falling back to a flat list — some entries may be unverifiable rather than too-new (see the per-pin annotations in this run for the real classification)."
              cp "${deduped_failures}" "${too_new_failures}"
              : > "${unverifiable_failures}"
            fi

            # shellcheck disable=SC2016
            # The printf format strings below intentionally contain literal
            # backticks and `%s` placeholders for Markdown rendering — no shell
            # expansion is wanted in those slots.
            {
              printf '%s\n\n' "${MARKER}"
              printf '### Dependency Age Check failed — %s\n\n' "${ECOSYSTEM}"

              if [ -s "${too_new_failures}" ]; then
                printf '#### Pins below quarantine\n\n'
                printf 'New pin(s) below have not yet reached the **%s-day** quarantine. Wait until the eligible date, push any new commit, and the check will pass.\n\n' "${MIN_AGE_DAYS}"
                printf '| %s | Age (days) | Eligible after | Days remaining |\n' "${ITEM_COLUMN}"
                printf '|---|---:|---|---:|\n'
                while IFS=$'\t' read -r id ver age _min eligible remaining _kind; do
                  [ -z "${id}" ] && continue
                  printf '| `%s%s%s` | %s | %s | %s |\n' \
                    "${id}" "${SEPARATOR}" "${ver}" "${age}" "${eligible}" "${remaining}"
                done < "${too_new_failures}"
                printf '\n'
              fi

              if [ -s "${unverifiable_failures}" ]; then
                printf '#### Pins that could not be verified\n\n'
                printf 'Upstream metadata fetch failed for the pin(s) below. This is usually a transient registry/API issue — re-run the failed check from the Actions tab; if it keeps failing, open an issue with the reason text.\n\n'
                printf '| %s | Reason |\n' "${ITEM_COLUMN}"
                printf '|---|---|\n'
                while IFS=$'\t' read -r id ver _age _min reason _remaining _kind; do
                  [ -z "${id}" ] && continue
                  printf '| `%s%s%s` | %s |\n' \
                    "${id}" "${SEPARATOR}" "${ver}" "${reason}"
                done < "${unverifiable_failures}"
                printf '\n'
              fi

              printf '> Need to merge sooner? Add the **`age-check-bypass`** label — verified-CVE emergencies only.\n'
              printf '\n<sub>Updated by `ops-routines-workflows/age-check-%s` · [run log](%s)</sub>\n' "${ECOSYSTEM}" "${RUN_URL}"
            } > "${body_file}"
            rm -f "${deduped_failures}" "${too_new_failures}" "${unverifiable_failures}"

            if [ -n "${existing_id}" ]; then
              if ! gh api -X PATCH "/repos/${REPO}/issues/comments/${existing_id}" \
                   -F "body=@${body_file}" >/dev/null 2>&1; then
                echo "::notice::Could not update age-check comment — caller workflow needs \`pull-requests: write\` (Dependabot PRs need this granted explicitly). Retry-after dates are in the Job Summary."
              fi
            else
              if ! gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body-file "${body_file}" >/dev/null 2>&1; then
                echo "::notice::Could not post age-check comment — caller workflow needs \`pull-requests: write\` (Dependabot PRs need this granted explicitly). Retry-after dates are in the Job Summary."
              fi
            fi
            rm -f "${body_file}"
          elif [ -n "${existing_id}" ]; then
            # No failures this run (neither too-new nor unverifiable); clear the
            # stale sticky if one exists so reviewers don't act on outdated
            # retry-after dates or stale upstream-error reasons.
            if ! gh api -X DELETE "/repos/${REPO}/issues/comments/${existing_id}" >/dev/null 2>&1; then
              echo "::notice::Could not delete stale age-check comment (id ${existing_id}). Caller workflow may need \`pull-requests: write\`."
            fi
          fi
