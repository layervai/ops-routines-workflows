# ============================================================================
# REUSABLE: pip Dependency Age Check (supply-chain guard, PUBLIC mirror)
# ----------------------------------------------------------------------------
# Self-contained: the bash lib is inlined below. No cross-repo checkout,
# no secrets required, no GitHub App involved. Public consumer repos
# point at this file (at the equivalent `layervai/ops-routines-workflows`
# mirror) because GitHub blocks public → internal reusable-workflow calls.
#
# DO NOT EDIT THIS FILE DIRECTLY. It's generated by
# `scripts/embed-lib-into-workflows.py` from:
#   - lib/_preflight.sh
#   - lib/age-check-pip.sh
#   - templates/workflows/age-check-pip.yml.tmpl
# Edit those sources and run `make embed-workflows`.
# ============================================================================
name: Dependency Age Check (pip, reusable)

on:
  workflow_call:
    inputs:
      min_age_days:
        description: "Minimum age in days for a newly pinned pip dependency."
        required: false
        type: number
        default: 7
      lockfile_path:
        description: "Explicit path to a single lockfile. Empty => auto-detect requirements*.txt + poetry.lock + pyproject.toml."
        required: false
        type: string
        default: ""
      working_directory:
        description: "Directory (relative to repo root) to cd into before running the check."
        required: false
        type: string
        default: "."

permissions:
  contents: read

concurrency:
  group: age-check-pip-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-pip-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check pip dependency upload ages
        working-directory: ${{ inputs.working_directory }}
        env:
          MIN_AGE_DAYS: ${{ inputs.min_age_days }}
          LOCKFILE_PATH: ${{ inputs.lockfile_path }}
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          # ============================================================================
          # _preflight.sh - Shared preflight helpers for age-check-*.sh
          # ============================================================================
          #
          # Sourced by each ecosystem-specific age-check script so the validator
          # logic stays consistent. Covers the class of silent-pass bugs that
          # bit the sibling per-repo dep-age checks (website#189, qurl-mcp#52,
          # qurl-portal#14, qurl-typescript#32, discord#21) before they were
          # hardened, plus the preflight probes those rounds added:
          #
          # - Positive-integer validation for MIN_AGE_DAYS (reject 0 and
          #   non-numeric)
          # - GNU `date -d` availability probe (catches BSD/macOS silently
          #   replacing GNU date)
          # - Required-tool existence checks (jq, curl, gh)
          # - Explicit base_ref verification before `git diff` so a missing ref
          #   doesn't get conflated with "no changes detected" by a trailing
          #   `|| true` on the filter pipeline
          # - Step-summary helpers so the Actions UI never shows an empty panel
          #   on early-exit paths
          # - Shared age comparison + ISO-8601 parsing to keep those callers
          #   minimal
          #
          # REQUIRED CALL ORDER in main():
          #
          #   preflight::require_tools jq curl [gh …]   # tools first
          #   preflight::require_gnu_date                # then date-d probe
          #   preflight::validate_min_age_days           # then env validation
          #   preflight::verify_base_ref "origin/${BASE_REF}"  # MUST come before any
          #                                              # subsequent `git diff` — see
          #                                              # the function comment for
          #                                              # the silent-pass reason.
          #
          # Usage (from an age-check script):
          #
          #   # shellcheck source=lib/_preflight.sh
          #   source "$(dirname "${BASH_SOURCE[0]}")/_preflight.sh"
          #
          # ============================================================================

          # Guard against double-sourcing — IFS and `set -e` state are caller's.
          if [ -n "${_PREFLIGHT_SOURCED:-}" ]; then
            return 0
          fi
          _PREFLIGHT_SOURCED=1

          # ----- Required-tool probes --------------------------------------------------

          preflight::require_tools() {
            local missing=()
            local tool
            for tool in "$@"; do
              command -v "$tool" >/dev/null 2>&1 || missing+=("$tool")
            done
            if [ ${#missing[@]} -gt 0 ]; then
              echo "::error::Required tools not available on runner: ${missing[*]}. This workflow depends on ubuntu-latest (or a runner image with these installed)."
              exit 1
            fi
          }

          # GNU date supports `date -d @<epoch>` syntax that BSD/macOS date
          # rejects. Every age-check script converts an ISO-8601 timestamp to
          # epoch via `date -d "$ts" +%s`; probing up front catches a silent
          # regression if the runner ever stops providing GNU date.
          preflight::require_gnu_date() {
            if ! date -d @0 >/dev/null 2>&1; then
              echo "::error::GNU date -d not available on runner — this workflow depends on GNU date's \`@\`-prefix epoch syntax. Fix: run on an \`ubuntu-latest\` / Linux runner, or replace the \`date -d\` calls with a portable alternative (e.g., \`python -c 'from datetime import datetime; ...'\`)."
              exit 1
            fi
          }

          # ----- MIN_AGE_DAYS validation ----------------------------------------------

          # Accept only POSITIVE integers (numeric value >= 1). Leading zeros are
          # allowed because some config generators pad to fixed width (e.g. "07");
          # a `07 ... 10#` base-10 round-trip keeps later arithmetic from tripping
          # on bash's octal parsing of zero-prefixed numbers at `$age_days -lt
          # $MIN_AGE_DAYS`.
          #
          # Rejects: 0, 00, negatives, non-numeric, empty.
          # Accepts: 1, 07, 100, 0007.
          preflight::validate_min_age_days() {
            local raw="${MIN_AGE_DAYS:-}"
            # Require at least one digit, reject non-digits. The `10#` base-10
            # prefix on the arithmetic below sidesteps bash's octal interpretation
            # of leading zeros (`$((07))` is 7 but `$((08))` is a syntax error).
            if ! [[ "$raw" =~ ^[0-9]+$ ]]; then
              echo "::error::MIN_AGE_DAYS must be a positive integer (got: ${raw:-<unset>})"
              exit 1
            fi
            if [ "$((10#$raw))" -lt 1 ]; then
              echo "::error::MIN_AGE_DAYS must be >= 1 (got: ${raw}). Zero would make the quarantine a silent-pass no-op."
              exit 1
            fi
            # Normalize to the base-10 numeric form so all subsequent callers do
            # integer comparisons without re-parsing leading zeros. Exported
            # because the variable was passed via env and most scripts reference
            # it directly rather than through a local.
            MIN_AGE_DAYS=$((10#$raw))
            export MIN_AGE_DAYS
          }

          # ----- Base-ref verification -------------------------------------------------

          # Verify the base ref exists in the local checkout before running
          # `git diff` against it. Without this, `git diff ... 2>/dev/null` on
          # a missing ref produces empty output, and a trailing `|| true` on
          # the downstream filter pipeline silently swallows the failure — the
          # script exits 0 with "No changes detected" even though the diff
          # never ran. Friendly error here, explicit failure exit.
          #
          # MUST BE CALLED before any subsequent `git diff`. Callers that extract
          # a diff via `$(git diff ...)` inside a helper function are protected
          # by this preflight *only* for the expected "missing base ref" failure
          # mode; for catastrophic git failures mid-script the helper still needs
          # its own `|| { echo ::error; return 1; }` branch.
          preflight::verify_base_ref() {
            local base_ref="$1"
            if [ -z "$base_ref" ]; then
              echo "::error::preflight::verify_base_ref called with empty argument"
              exit 1
            fi
            if ! git rev-parse --verify --quiet "$base_ref" >/dev/null; then
              echo "::error::Base ref ${base_ref} not found in this checkout. If you triggered this workflow via workflow_dispatch, ensure the base branch is fetched (fetch-depth: 0 on actions/checkout)."
              exit 1
            fi
            # Record successful verification so `preflight::require_base_ref_verified`
            # can assert it elsewhere if callers want a belt-and-suspenders check.
            _PREFLIGHT_BASE_REF_VERIFIED=1
          }

          # Optional defensive check: assert verify_base_ref has run. Callers can
          # invoke this right before a `git diff` as a static sanity check that
          # the required-call-order convention was actually followed.
          preflight::require_base_ref_verified() {
            if [ -z "${_PREFLIGHT_BASE_REF_VERIFIED:-}" ]; then
              echo "::error::preflight::verify_base_ref must be called before any git diff. This is a coding error, not a runtime condition."
              exit 1
            fi
          }

          # ----- ISO-8601 → epoch helper ----------------------------------------------

          # Every ecosystem converts a registry-returned ISO-8601 timestamp into
          # epoch seconds via `date -d "$ts" +%s`, and every one had its own
          # error-handling branch. Shared helper echoes epoch on stdout, exits 1
          # on parse failure with the offending timestamp in the stderr message.
          # Caller can use `if ! epoch=$(preflight::iso8601_to_epoch "$ts"); then
          # ...skip or fail... fi`.
          preflight::iso8601_to_epoch() {
            local ts="$1"
            local epoch
            if [ -z "$ts" ]; then
              return 1
            fi
            if ! epoch=$(date -d "$ts" +%s 2>/dev/null); then
              return 1
            fi
            echo "$epoch"
          }

          # Given a publish epoch + now epoch + MIN_AGE_DAYS, emit the age in
          # days on stdout and return a classification via exit code:
          #   0 - passes; age >= MIN_AGE_DAYS + 2 (clearly past threshold)
          #   2 - passes but borderline; MIN_AGE_DAYS <= age <= MIN_AGE_DAYS + 1
          #       (the "just past threshold" :eyes: case — advance warning that
          #       a small threshold bump or an unpublish would flip this PR)
          #   1 - fails; age < MIN_AGE_DAYS (too new)
          #
          # !!! CALLER CONVENTION !!!
          # Callers MUST use a 3-way `case` on the exit code, NOT a 2-way
          # `if/then/else`. A naïve `if preflight::classify_age …; then ok; else fail; fi`
          # would silently misclassify BOTH `1` (too_new) AND `2` (borderline)
          # as failures — losing the advance-warning signal and (worse) treating
          # a borderline pass as a block.
          #
          # Correct pattern:
          #   rc=0
          #   age_days=$(preflight::classify_age "$pub" "$now" "$MIN_AGE_DAYS") || rc=$?
          #   case "$rc" in
          #     0) ok ;;
          #     2) borderline ;;
          #     *) too_new ;;  # catches 1 and any future non-pass codes
          #   esac
          #
          preflight::classify_age() {
            local publish_epoch="$1" now_epoch="$2" min_age_days="$3"
            local age_days=$(( (now_epoch - publish_epoch) / 86400 ))
            echo "$age_days"
            if [ "$age_days" -lt "$min_age_days" ]; then
              return 1
            fi
            if [ "$age_days" -le "$((min_age_days + 1))" ]; then
              return 2
            fi
            return 0
          }

          # Given a publish epoch + MIN_AGE_DAYS, echo the ISO date (UTC) when
          # the package becomes eligible. Used in the "too new" error message
          # so developers know when to retry without needing the bypass label.
          # Falls back to "unknown" on parse error rather than breaking the
          # error message flow.
          preflight::eligible_date_utc() {
            local publish_epoch="$1" min_age_days="$2"
            date -u -d "@$((publish_epoch + min_age_days * 86400))" +%Y-%m-%d 2>/dev/null || echo "unknown"
          }

          # ----- Shared age-check outcome helper --------------------------------------

          # Classify a dependency's age and emit the full CI output for it
          # (markdown row + log annotation). Returns an exit code the caller
          # can map to its counters. For the typical caller pattern that
          # updates both `checked_count` and `failed`, use the thin wrapper
          # `preflight::age_row_and_tally` which does the mapping via bash's
          # dynamic scoping.
          #
          # !!! SECURITY CONTRACT !!!
          # `display_id` and `display_version` are interpolated directly into:
          #   - the markdown row (caller-inspectable via $GITHUB_STEP_SUMMARY)
          #   - log lines (visible in the Actions job log)
          # This helper does NOT re-sanitize them. Callers MUST pre-sanitize via
          # `preflight::safe_for_md` (or a tighter ecosystem-specific validator
          # like `is_valid_pkg_name`) before passing in, otherwise a crafted
          # lockfile / registry response could inject active markdown into the
          # step summary.
          #
          # Arguments:
          #   $1 display_id        e.g. "lodash" or "actions/checkout" (sanitized)
          #   $2 display_version   e.g. "4.17.21" or "1a2b3c4d" (sanitized)
          #   $3 publish_time      ISO-8601 string from the registry
          #   $4 now_epoch         caller's pre-computed `date +%s`
          #   $5 min_age_days      positive integer (caller already validated)
          #   $6 verb              past-tense verb for too-new error messages
          #                        ("published" | "committed" | "built" |
          #                        "uploaded"). Defaults to "published".
          #   $7 file_hint         optional source filename for `file=` annotation
          #   $8 separator         how to join id + version in log lines. Default
          #                        "@"; pip uses "==".
          #
          # Exit codes (richer than ok/fail so callers can distinguish borderline
          # from too_new, and parse_error from a real too-new result):
          #   0 — ok (clearly past threshold)
          #   1 — too_new
          #   2 — borderline (just past threshold; counts as pass, with :eyes: row)
          #   3 — parse_error (malformed ISO-8601 or missing required arg)
          preflight::age_row_for_publish() {
            local display_id="$1" display_version="$2" publish_time="$3"
            local now_epoch="$4" min_age_days="$5"
            local verb="${6:-published}"
            local file_hint="${7:-}"
            local sep="${8:-@}"

            # Required-arg validation. Name the specific missing arg in the
            # error so a future caller doesn't have to bisect. `verb`, `file_hint`,
            # `sep` have defaults; the five below do not. Empty values would
            # surface later as arithmetic errors or spurious row text.
            local arg
            for arg in display_id display_version publish_time now_epoch min_age_days; do
              if [ -z "${!arg}" ]; then
                echo "::error::preflight::age_row_for_publish: required arg \`${arg}\` was empty"
                return 3
              fi
            done

            # Full identifier for log lines; row cells stay separate.
            local full_id="${display_id}${sep}${display_version}"

            # GitHub Actions annotation format requires `::` between command
            # (+ optional params) and message. `::error::msg` is valid;
            # `::error msg` is NOT and will render as plain log text. So:
            #   no file_hint → `::` (bare delimiter)
            #   with hint    → ` file=<path>::` (leading space separates
            #                  `::error` from params, trailing `::` closes them)
            local file_prefix="::"
            [ -n "$file_hint" ] && file_prefix=" file=${file_hint}::"

            local publish_epoch
            if ! publish_epoch=$(preflight::iso8601_to_epoch "$publish_time"); then
              echo "::error${file_prefix}Could not parse publish timestamp for ${full_id}: ${publish_time}"
              echo "| \`${display_id}\` | ${display_version} | — | :x: parse error |" >> "$GITHUB_STEP_SUMMARY"
              return 3
            fi

            local age_days class_rc=0
            age_days=$(preflight::classify_age "$publish_epoch" "$now_epoch" "$min_age_days") || class_rc=$?

            case "$class_rc" in
              0)
                echo "  OK: ${full_id} (${age_days} days old)"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :white_check_mark: |" >> "$GITHUB_STEP_SUMMARY"
                return 0
                ;;
              2)
                echo "::notice${file_prefix}${full_id} is ${age_days} day(s) old — just past the ${min_age_days}-day threshold"
                echo "  OK: ${full_id} (${age_days} days old, barely past threshold)"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :eyes: just past threshold |" >> "$GITHUB_STEP_SUMMARY"
                return 2
                ;;
              *)
                local eligible; eligible=$(preflight::eligible_date_utc "$publish_epoch" "$min_age_days")
                echo "::error${file_prefix}${full_id} ${verb} ${age_days} day(s) ago (minimum: ${min_age_days}; eligible after ${eligible})"
                echo "| \`${display_id}\` | ${display_version} | ${age_days} | :x: **too new** (eligible after ${eligible}) |" >> "$GITHUB_STEP_SUMMARY"
                return 1
                ;;
            esac
          }

          # Wraps `preflight::age_row_for_publish` and updates the caller's
          # `checked_count` and `failed` via bash's dynamic scoping. This is the
          # call most ecosystem scripts should use — one line, no case statement
          # at the callsite.
          #
          # Convention: caller MUST have locals named exactly `checked_count`
          # (integer) and `failed` ("true"/"false"). These are looked up through
          # the dynamic scope chain at runtime — no nameref magic, works on
          # bash >= 4.0 (and on macOS bash 3.2 for local-dev tests).
          #
          # Outcome mapping:
          #   ok (rc 0)            → checked_count++
          #   borderline (rc 2)    → checked_count++
          #   too_new (rc 1)       → checked_count++, failed=true
          #   parse_error (rc 3)   → failed=true (checked not incremented)
          #
          # All args are passed through to age_row_for_publish unchanged.
          preflight::age_row_and_tally() {
            local rc=0
            preflight::age_row_for_publish "$@" || rc=$?
            # Deliberate dynamic-scope writes: caller provides `checked_count`
            # and `failed` as locals; we update them in place.
            # shellcheck disable=SC2034
            case "$rc" in
              0|2) checked_count=$((checked_count + 1)) ;;
              1)   checked_count=$((checked_count + 1)); failed=true ;;
              3)   failed=true ;;
            esac
          }

          # ----- Output sanitization --------------------------------------------------

          # Sanitize arbitrary strings before writing to $GITHUB_STEP_SUMMARY.
          # Used for values that either pre-date a validator (the invalid-name
          # branch in each ecosystem) or come from untrusted lockfile / registry
          # output (version strings, image tags). Strips to a character class
          # that can't form active markdown (link/image/emphasis/HTML) and caps
          # length at 80 so a crafted over-long entry can't blow out the summary.
          #
          # Kept permissive enough that legitimate semver (`1.2.3+build.7`) and
          # scoped package names (`@scope/name`) survive round-trip unchanged.
          #
          # `LC_ALL=C` forces byte-level (ASCII-only) behavior so the tr + head
          # combo is deterministic across hosts. In a UTF-8 locale, `[:alnum:]`
          # would keep accented Latin letters and CJK chars, and `head -c 80`
          # could split a multibyte char at the boundary. Neither is a security
          # hole (markdown injection is still blocked), but byte-level behavior
          # is easier to audit and test. Unicode homoglyph attacks on package
          # names are a separate concern — handled (if at all) by the caller's
          # `is_valid_*` ASCII-only allowlists, not here.
          preflight::safe_for_md() {
            LC_ALL=C printf '%s' "$1" | LC_ALL=C tr -cd '[:alnum:]@/_.:+-' | LC_ALL=C head -c 80
          }

          # ----- Step-summary helpers --------------------------------------------------

          # `GITHUB_STEP_SUMMARY` is provided by GitHub Actions; default to
          # /dev/null for local runs so the helper doesn't error out. The
          # workflow always provides it in CI.
          : "${GITHUB_STEP_SUMMARY:=/dev/null}"

          preflight::step_summary_header() {
            local ecosystem="$1"
            {
              echo "## Dependency Age Check — ${ecosystem}"
              echo ""
              echo "| Package | Version | Age (days) | Status |"
              echo "|---------|---------|------------|--------|"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # For the "no changes" / "no deps" early-exit paths. Writes a single
          # summary blockquote line so the Actions UI reflects the early-exit
          # outcome instead of an empty summary panel.
          preflight::step_summary_no_changes() {
            local ecosystem="$1" reason="$2"
            {
              echo "## Dependency Age Check — ${ecosystem}"
              echo ""
              echo "> ${reason} :white_check_mark:"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          preflight::step_summary_all_passed() {
            local checked_count="$1" min_age_days="$2" skipped_count="${3:-0}"
            {
              echo ""
              echo "> Verified ${checked_count} package(s) at ≥ ${min_age_days} days old. :white_check_mark:"
              if [ "$skipped_count" -gt 0 ]; then
                echo "> ${skipped_count} skipped (see warnings above)."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # Now accepts optional counts so the footer breakdown matches what
          # callers actually tracked. Positional args are kept backwards-compatible
          # (only min_age_days is required).
          preflight::step_summary_failed() {
            local min_age_days="$1" checked_count="${2:-}" skipped_count="${3:-}"
            {
              echo ""
              echo "> **One or more dependencies failed the ${min_age_days}-day age check.** Add the \`age-check-bypass\` label to override (verified-CVE bypass only — see runbooks/phase-0-checklist.md)."
              if [ -n "$checked_count" ] || [ -n "$skipped_count" ]; then
                echo ">"
                echo "> Breakdown: **${checked_count:-?}** checked, **${skipped_count:-0}** skipped. See the table above for which rows failed (marked :x:)."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # Guard against "registry outage → every package skipped → workflow
          # passes" — if nothing actually got verified, fail and write a
          # summary explaining why.
          preflight::step_summary_all_skipped() {
            local skipped_count="$1"
            {
              echo ""
              echo "> **No packages could be verified** (all ${skipped_count} were skipped). Treating as failure to avoid silent pass on registry outage."
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # ============================================================================
          # age-check-pip.sh - Block newly published PyPI dependencies (supply chain)
          # ============================================================================
          #
          # Purpose:
          #   PyPI analog of dependency-age-check.yml. Parses requirements*.txt,
          #   poetry.lock, and pyproject.toml (PEP 621 + Poetry table forms),
          #   compares against origin/$BASE_REF, and fails closed if any
          #   newly-pinned (pkg==version) is younger than MIN_AGE_DAYS.
          #
          # Expected env vars:
          #   MIN_AGE_DAYS   - default 7
          #   BASE_REF       - default 'main'
          #   LOCKFILE_PATH  - default '' (auto-detects requirements*.txt + poetry.lock + pyproject.toml)
          #
          # Exit codes:
          #   0 - all new deps >= MIN_AGE_DAYS
          #   1 - at least one dep too young or age unverifiable
          #
          # Pre-release handling:
          #   Versions with a|b|rc|dev suffix emit a warning and the PR should receive
          #   the `manual-review-required` label, but they do NOT fail this check.
          #
          # ============================================================================

          set -euo pipefail
          IFS=$'\n\t'

          MIN_AGE_DAYS="${MIN_AGE_DAYS:-7}"
          BASE_REF="${BASE_REF:-main}"
          LOCKFILE_PATH="${LOCKFILE_PATH:-}"


          # ----- Input validation: PyPI package name ----------------------------------

          # Validates PyPI package name per PEP 508 / PEP 503 (normalized form).
          # Defense against a crafted requirements.txt injecting shell chars or
          # URL fragments into the pypi.org lookup URL. PEP 508 allows letters,
          # digits, underscores, hyphens, and dots (with some restrictions on
          # first/last char).
          pip_age::is_valid_pkg_name() {
            local name="$1"
            # PyPI doesn't enforce a formal length cap but 214 matches what other
            # registries use and is more than enough for real packages.
            [ ${#name} -le 214 ] || return 1
            [[ "$name" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*[A-Za-z0-9]$ ]] || [[ "$name" =~ ^[A-Za-z0-9]$ ]]
          }

          # ----- Separable: lockfile diff → pkg==version lines on stdout --------------

          pip_age::diff_requirements() {
            local file="$1" base_ref="$2"
            local diff_out
            diff_out=$(git diff "${base_ref}"...HEAD -- "$file") \
              || { echo "::error::git diff against ${base_ref} for ${file} failed"; return 1; }
            printf '%s\n' "$diff_out" \
              | awk '/^\+[^+]/' \
              | sed 's/^\+//;s/[[:space:]]*#.*$//;s/[[:space:]]\+//g' \
              | grep -E '^[A-Za-z0-9_.-]+==[A-Za-z0-9_.+-]+$' \
              | sort -u || true
          }

          pip_age::diff_poetry_lock() {
            local file="$1" base_ref="$2"
            # poetry.lock uses TOML blocks [[package]] with name = "X" and version = "Y".
            # Grab added name/version pairs from the diff.
            local diff_out
            diff_out=$(git diff "${base_ref}"...HEAD -- "$file") \
              || { echo "::error::git diff against ${base_ref} for ${file} failed"; return 1; }
            printf '%s\n' "$diff_out" \
              | awk '
                /^\+name = /    { gsub(/^\+name = "|"$/,""); name=$0; next }
                /^\+version = / { gsub(/^\+version = "|"$/,""); if (name != "") print name "==" $0; name="" }' \
              | sort -u
          }

          # pyproject.toml supports two pinned-dep formats:
          #   PEP 621 list form (hatchling, setuptools, flit, PDM, modern uv):
          #     [project]
          #     dependencies = ["requests==2.31.0", "pydantic[email] == 2.5.0"]
          #     [project.optional-dependencies]
          #     dev = ["pytest==7.0.0"]
          #   Poetry table form (older [tool.poetry] style):
          #     [tool.poetry.dependencies]
          #     requests = "==2.31.0"
          #
          # We only emit deps that are *exactly* pinned with `==`. Loose specifiers
          # (>=, ^, ~=) don't have a single deterministic version to age-check, so
          # we skip them rather than guess a satisfying release.
          pip_age::diff_pyproject() {
            local file="$1" base_ref="$2"
            local diff_out
            diff_out=$(git diff "${base_ref}"...HEAD -- "$file") \
              || { echo "::error::git diff against ${base_ref} for ${file} failed"; return 1; }

            local added_lines
            added_lines=$(printf '%s\n' "$diff_out" \
              | awk '/^\+[^+]/' \
              | sed 's/^\+//;s/[[:space:]]*#.*$//')

            # PEP 621 list form: a quoted string anywhere on the line shaped like
            #   "name[extras] == version"
            # Extract each quoted candidate first (so the array's outer `[...]`
            # brackets can't be confused with PEP 508 `[extras]`), then strip
            # the optional extras and whitespace around `==`.
            local pep621
            pep621=$(printf '%s\n' "$added_lines" \
              | grep -oE "[\"'][[:space:]]*[A-Za-z0-9][A-Za-z0-9._-]*[[:space:]]*(\[[^][]*\])?[[:space:]]*==[[:space:]]*[A-Za-z0-9][A-Za-z0-9._+-]*[[:space:]]*[\"']" \
              | sed -E "s/^[\"'][[:space:]]*//;s/[[:space:]]*[\"']\$//;s/\[[^][]*\]//;s/[[:space:]]*==[[:space:]]*/==/" \
              || true)

            # Poetry table form: line starts with `name = "==version"` (or single
            # quotes). Anchor to start-of-line so we don't double-match a PEP 621
            # list entry that happens to contain `==`.
            local poetry
            poetry=$(printf '%s\n' "$added_lines" \
              | grep -oE "^[[:space:]]*[A-Za-z0-9][A-Za-z0-9._-]*[[:space:]]*=[[:space:]]*[\"'][[:space:]]*==[[:space:]]*[A-Za-z0-9][A-Za-z0-9._+-]*[[:space:]]*[\"']" \
              | sed -E "s/^[[:space:]]+//;s/[[:space:]]*=[[:space:]]*[\"'][[:space:]]*==[[:space:]]*/==/;s/[[:space:]]*[\"']\$//" \
              || true)

            printf '%s\n%s\n' "$pep621" "$poetry" \
              | awk 'NF > 0' \
              | sort -u
          }

          # ----- Separable: registry query → ISO-8601 upload timestamp ----------------

          pip_age::uploaded_at() {
            local pkg="$1" ver="$2"
            local url="https://pypi.org/pypi/${pkg}/${ver}/json"
            local resp status ts
            resp=$(curl -sS -m 15 -w '\n%{http_code}' "$url" 2>/dev/null || true)
            if [ -z "$resp" ]; then
              return 1
            fi
            status=$(echo "$resp" | tail -n1)
            if [ "$status" = "429" ]; then
              # Rate-limited. Must go to stderr — stdout is captured by the caller
              # via `$(pip_age::uploaded_at …)`.
              echo "::warning::${pkg}==${ver} — rate-limited by pypi.org (429)" >&2
              return 1
            fi
            if [ "$status" != "200" ]; then
              return 1
            fi
            ts=$(echo "$resp" | sed '$d' | jq -r '.urls[0].upload_time_iso_8601 // empty')
            [ -n "$ts" ] || return 1
            echo "$ts"
          }

          pip_age::is_prerelease() {
            local ver="$1"
            [[ "$ver" =~ (a|b|rc|dev)[0-9]+ ]] || [[ "$ver" == *"+"* ]]
          }

          # ----- Main -----------------------------------------------------------------

          pip_age::main() {
            preflight::require_tools curl jq awk sed grep sort
            preflight::require_gnu_date
            preflight::validate_min_age_days

            local base_ref="origin/${BASE_REF}"
            preflight::verify_base_ref "$base_ref"

            local now_epoch; now_epoch=$(date +%s)
            local failed=false
            local checked_count=0
            local skipped_count=0

            local -a targets=()
            if [ -n "$LOCKFILE_PATH" ] && [ -f "$LOCKFILE_PATH" ]; then
              # Dispatch on filename — caller may point us at requirements.txt,
              # poetry.lock, or pyproject.toml. We pick the matching parser
              # rather than asking the caller to also pass a kind.
              local base; base=$(basename "$LOCKFILE_PATH")
              case "$base" in
                pyproject.toml) targets+=("pyproject:${LOCKFILE_PATH}") ;;
                poetry.lock)    targets+=("poetry:${LOCKFILE_PATH}") ;;
                *)              targets+=("req:${LOCKFILE_PATH}") ;;
              esac
            else
              for f in requirements.txt requirements-*.txt requirements/*.txt; do
                [ -f "$f" ] && targets+=("req:${f}")
              done
              [ -f "poetry.lock" ] && targets+=("poetry:poetry.lock")
              [ -f "pyproject.toml" ] && targets+=("pyproject:pyproject.toml")
            fi

            if [ "${#targets[@]}" -eq 0 ]; then
              echo "No pip lockfiles found (requirements*.txt, poetry.lock, or pyproject.toml)"
              preflight::step_summary_no_changes "pip" "No pip lockfiles found in this checkout."
              exit 0
            fi

            preflight::step_summary_header "pip"

            for entry in "${targets[@]}"; do
              local kind="${entry%%:*}" file="${entry#*:}"
              echo "::group::Checking ${file}"

              local new_deps=""
              case "$kind" in
                req)       new_deps=$(pip_age::diff_requirements "$file" "$base_ref") ;;
                poetry)    new_deps=$(pip_age::diff_poetry_lock  "$file" "$base_ref") ;;
                pyproject) new_deps=$(pip_age::diff_pyproject    "$file" "$base_ref") ;;
              esac

              if [ -z "$new_deps" ]; then
                echo "No new dependencies in ${file}"
                echo "::endgroup::"
                continue
              fi

              while IFS= read -r dep; do
                [ -z "$dep" ] && continue
                local pkg="${dep%%==*}" ver="${dep##*==}"
                if [ -z "$pkg" ] || [ -z "$ver" ] || [ "$pkg" = "$ver" ]; then
                  continue
                fi

                # Validate pkg name BEFORE it reaches curl.
                if ! pip_age::is_valid_pkg_name "$pkg"; then
                  local safe_pkg; safe_pkg=$(preflight::safe_for_md "$pkg")
                  echo "::warning file=${file}::${safe_pkg} — does not match PyPI package name rules (skipped)"
                  echo "| \`${safe_pkg}\` | — | — | :warning: invalid name (skipped) |" >> "$GITHUB_STEP_SUMMARY"
                  skipped_count=$((skipped_count + 1))
                  continue
                fi

                local safe_ver; safe_ver=$(preflight::safe_for_md "$ver")

                if pip_age::is_prerelease "$ver"; then
                  echo "::warning file=${file}::${pkg}==${ver} is a pre-release; age check skipped. Label PR with 'manual-review-required'."
                  echo "| \`${pkg}\` | ${safe_ver} | — | :warning: pre-release (manual review) |" >> "$GITHUB_STEP_SUMMARY"
                  skipped_count=$((skipped_count + 1))
                  continue
                fi

                # Rate limit: pypi.org is usually snappy, but be a good citizen.
                sleep 0.1

                local ts
                if ! ts=$(pip_age::uploaded_at "$pkg" "$ver"); then
                  echo "::error file=${file}::Could not verify age for ${pkg}==${ver} (pypi.org unreachable or version not found)"
                  echo "| \`${pkg}\` | ${safe_ver} | — | :x: registry unreachable |" >> "$GITHUB_STEP_SUMMARY"
                  failed=true
                  continue
                fi

                # Classify + emit via shared helper. _and_tally updates counters
                # via dynamic scoping. Separator is `==` (PyPI/PEP 508); verb
                # is "uploaded" (PyPI's term for release).
                preflight::age_row_and_tally \
                  "$pkg" "$safe_ver" "$ts" "$now_epoch" "$MIN_AGE_DAYS" \
                  "uploaded" "$file" "=="
              done <<< "$new_deps"

              echo "::endgroup::"
            done

            # Guard: if nothing was verified but some were skipped (pre-releases
            # don't count against us here, but a registry outage that made all
            # real deps unverifiable would already have set failed=true on each).
            # This catches the pathological case where every dep is a pre-release
            # AND nothing was verified — unusual but worth flagging.
            if [ "$checked_count" -eq 0 ] && [ "$skipped_count" -gt 0 ] && [ "$failed" = false ]; then
              echo "::warning::No pip packages were verified (all ${skipped_count} were pre-releases or skipped). Consider manual review."
            fi

            if [ "$failed" = true ]; then
              preflight::step_summary_failed "$MIN_AGE_DAYS" "$checked_count" "$skipped_count"
              echo ""
              echo "::error::One or more pip dependencies failed the age check."
              echo "To bypass for emergency security updates, add the 'age-check-bypass' label to this PR."
              exit 1
            fi

            preflight::step_summary_all_passed "$checked_count" "$MIN_AGE_DAYS" "$skipped_count"
            echo "All pip dependencies are at least ${MIN_AGE_DAYS} days old"
          }
          pip_age::main
